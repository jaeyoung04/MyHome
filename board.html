<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자유게시판 | Samsung DX</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Default Dark Mode */
            --bg-base: #030712;
            --bg-bento: rgba(17, 24, 39, 0.6);
            --bg-bento-hover: rgba(31, 41, 55, 0.8);
            --border-bento: rgba(59, 130, 246, 0.2);
            --border-highlight: rgba(59, 130, 246, 0.6);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent-primary: #3b82f6;
            --accent-glow: 0 0 20px rgba(59, 130, 246, 0.5);
            --radius-lg: 24px;
            --transition: all 0.3s ease;
        }

        body.light-mode {
            --bg-base: #f8fafc;
            --bg-bento: rgba(255, 255, 255, 0.8);
            --bg-bento-hover: rgba(255, 255, 255, 1);
            --border-bento: rgba(203, 213, 225, 0.5);
            --border-highlight: rgba(59, 130, 246, 0.4);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-glow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 5rem;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        
        h1, h2, h3 { font-family: 'Outfit', sans-serif; font-weight: 800; letter-spacing: -0.03em; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(130, 130, 130, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(130, 130, 130, 0.6); }

        /* Top Navigation */
        .navbar {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: stretch;
            padding: 1.5rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        body.light-mode .navbar { border-bottom: 1px solid rgba(0,0,0,0.05); }

        @keyframes expandMenu {
            from { opacity: 0; clip-path: inset(0 0 100% 0); transform: translateY(-10px); }
            to { opacity: 1; clip-path: inset(0 0 0 0); transform: translateY(0); }
        }

        /* Premium Morphing Hamburger */
        .hamburger-container {
            width: 20px;
            height: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        .ham-line {
            display: block;
            height: 2px;
            width: 100%;
            border-radius: 2px;
            background-color: var(--text-primary);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            transform-origin: center;
        }
        .hamburger-container.is-active .ham-line:nth-child(1) {
            transform: translateY(6px) rotate(45deg);
        }
        .hamburger-container.is-active .ham-line:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .hamburger-container.is-active .ham-line:nth-child(3) {
            transform: translateY(-6px) rotate(-45deg);
        }

        .logo { font-size: 1.6rem; color: var(--text-primary); text-decoration: none; font-weight: 800; }
        .logo span { color: var(--accent-primary); font-weight: 900; }
        
        .glow-btn {
            background: rgba(59, 130, 246, 0.1); color: var(--text-primary);
            border: 1px solid var(--accent-primary); padding: 0.6rem 1.5rem;
            border-radius: 20px; cursor: pointer; font-weight: 600; transition: var(--transition);
        }
        .glow-btn:hover { background: var(--accent-primary); box-shadow: var(--accent-glow); transform: translateY(-2px); }

        /* Board Container Layout */
        .page-container { max-width: 1200px; margin: 3rem auto; padding: 0 1.5rem; }
        .board-header { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            margin-bottom: 1rem; border-bottom: 2px solid var(--border-highlight); padding-bottom: 1rem;
        }
        .board-header h1 { font-size: 2.5rem; }
        .board-header .subtitle { color: var(--text-secondary); margin-left: 1rem; font-weight: 400; font-size: 1rem; }
        
        .board-controls { display: flex; justify-content: space-between; margin-bottom: 1.5rem; align-items: center; }
        .search-bar { 
            display: flex; align-items: center; background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border-bento); border-radius: 20px; padding: 0.4rem 1rem;
        }
        body.light-mode .search-bar { background: rgba(0,0,0,0.03); }
        .search-bar input { background: transparent; border: none; color: var(--text-primary); outline: none; padding-left: 0.5rem; width: 250px; }
        .primary-btn { 
            padding: 0.7rem 2rem; background: var(--accent-primary); color: white; 
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer; 
            transition: 0.2s; box-shadow: var(--accent-glow); font-size: 1rem;
        }
        .primary-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* List Table */
        .board-list { width: 100%; border-collapse: collapse; background: var(--bg-bento); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        body.light-mode .board-list { border: 1px solid var(--border-bento); }
        .board-list th, .board-list td { padding: 1.2rem 1rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        body.light-mode .board-list th, body.light-mode .board-list td { border-bottom-color: rgba(0,0,0,0.05); }
        .board-list th { color: var(--text-secondary); font-weight: 600; background: rgba(0,0,0,0.2); }
        body.light-mode .board-list th { background: rgba(0,0,0,0.03); }
        
        .board-list tr { transition: background 0.2s; }
        .board-list tr:hover { background: rgba(255,255,255,0.05); }
        body.light-mode .board-list tr:hover { background: rgba(0,0,0,0.02); }
        
        .col-id { width: 8%; color: var(--text-secondary); }
        .col-title { width: 50%; text-align: left !important; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .col-title:hover { color: var(--accent-primary); text-decoration: underline; }
        .col-author { width: 15%; }
        .col-date { width: 17%; color: var(--text-secondary); font-size: 0.9rem; }
        .col-likes { width: 10%; color: #ef4444; font-weight: 600; }

        .lock-icon { color: var(--text-secondary); margin-right: 6px; font-size: 0.9em; }
        .empty-row { padding: 3rem !important; color: var(--text-secondary); font-style: italic; }

        /* Modal Overlay */
        .modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal.active { display: flex; opacity: 1; }
        
        .modal-content {
            background: var(--bg-bento); border: 1px solid var(--border-highlight);
            border-radius: var(--radius-lg); width: 90vw; max-width: 700px;
            padding: 2.5rem; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transform: scale(0.95); transition: transform 0.3s ease;
            max-height: 90vh; overflow-y: auto;
        }
        body.light-mode .modal-content { background: rgba(255,255,255,0.98); }
        .modal.active .modal-content { transform: scale(1); }
        
        .close-modal { position: absolute; top: 1.5rem; right: 1.5rem; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); transition: 0.2s; }
        .close-modal:hover { color: var(--accent-primary); transform: rotate(90deg); }

        /* Form Elements inside Modal */
        .form-group { margin-bottom: 1.2rem; }
        .form-input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-bento); 
            color: var(--text-primary); padding: 0.8rem 1rem; border-radius: 8px; font-family: 'Inter'; font-size: 1rem;
        }
        body.light-mode .form-input { background: white; border-color: #cbd5e1; color: #0f172a; }
        .form-input:focus { outline: none; border-color: var(--accent-primary); }
        
        /* Custom View Post Modal specific */
        .view-title { font-size: 1.8rem; margin-bottom: 0.5rem; word-break: break-all;}
        .view-meta { display: flex; gap: 1rem; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        body.light-mode .view-meta { border-bottom-color: rgba(0,0,0,0.1); }
        .view-content { min-height: 150px; font-size: 1.05rem; line-height: 1.7; white-space: pre-wrap; margin-bottom: 2rem; color: var(--text-primary); }
        .view-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
        body.light-mode .view-actions { border-top-color: rgba(0,0,0,0.1); }
        
        .view-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1rem; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .view-btn:hover { color: var(--accent-primary); }

        @media (max-width: 768px) {
            .board-controls { flex-direction: column; gap: 1rem; align-items: stretch; }
            .col-author, .col-date, .col-id { display: none; }
            .col-title { width: 80%; }
            .modal-content { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="index.html" class="logo">
                <span>Samsung</span> DX
            </a>
            <div style="display: flex; gap: 0.8rem; align-items: center;">
                <button class="glow-btn" id="themeToggle" onclick="toggleTheme()" title="Theme Toggle">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="glow-btn" onclick="toggleLanguage()">🌐 EN / KO</button>
                <button class="glow-btn" onclick="toggleMenu()" title="전체 메뉴" style="display: flex; align-items: center; justify-content: center; padding-top: 0.8rem; padding-bottom: 0.8rem;">
                    <div id="hamburgerIcon" class="hamburger-container">
                        <span class="ham-line"></span>
                        <span class="ham-line"></span>
                        <span class="ham-line"></span>
                    </div>
                </button>
            </div>
        </div>

        <div id="navMenu" style="max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.4s ease, margin-top 0.4s ease;">
            <div style="display: flex; flex-direction: column; gap: 0.2rem; border-top: 1px solid var(--border-bento); padding: 1rem 0.5rem;">
                <a href="index.html" style="padding: 1rem 1rem; border-radius: 12px; color: var(--text-primary); text-decoration: none; font-weight: 600; display: block; transition: background 0.2s;" data-i18n="nav_home_board" onmouseover="this.style.background='rgba(59, 130, 246, 0.1)'" onmouseout="this.style.background='transparent'"><i class="fa-solid fa-house" style="width: 25px;"></i> 홈</a>
                <a href="board.html" style="padding: 1rem 1rem; border-radius: 12px; color: var(--text-primary); text-decoration: none; font-weight: 600; display: block; transition: background 0.2s;" data-i18n="nav_board_board" onmouseover="this.style.background='rgba(59, 130, 246, 0.1)'" onmouseout="this.style.background='transparent'"><i class="fa-solid fa-comments" style="width: 25px;"></i> 자유게시판</a>
            </div>
        </div>
        <script>
            function toggleMenu() {
                const menu = document.getElementById('navMenu');
                const hamburgerIcon = document.getElementById('hamburgerIcon');

                if (menu.style.maxHeight === '0px' || menu.style.maxHeight === '') {
                    menu.style.maxHeight = '300px';
                    menu.style.opacity = '1';
                    menu.style.marginTop = '1.5rem';

                    hamburgerIcon.classList.add('is-active');
                } else {
                    menu.style.maxHeight = '0px';
                    menu.style.opacity = '0';
                    menu.style.marginTop = '0px';

                    hamburgerIcon.classList.remove('is-active');
                }
            }
        </script>
    </nav>

    <div class="page-container">
        <div class="board-header">
            <div>
                <h1 data-i18n="board_page_title">자유게시판 <span class="subtitle">건강한 피드백과 자유로운 기술 토론의 장</span></h1>
            </div>
        </div>

        <div class="board-controls">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass" style="color: var(--text-secondary);"></i>
                <input type="text" id="searchInput" placeholder="제목 또는 작성자 검색..." onkeyup="if(event.key==='Enter') renderBoard()" data-i18n="board_search_ph">
            </div>
            <button class="primary-btn" onclick="openModal('writeModal')" data-i18n="board_btn_write"><i class="fa-solid fa-pen"></i> 글쓰기</button>
        </div>

        <table class="board-list">
            <thead>
                <tr>
                    <th class="col-id" data-i18n="col_id">번호</th>
                    <th class="col-title" data-i18n="col_title">제목</th>
                    <th class="col-author" data-i18n="col_author">작성자</th>
                    <th class="col-date" data-i18n="col_date">작성일</th>
                    <th class="col-likes" data-i18n="col_likes">추천</th>
                </tr>
            </thead>
            <tbody id="boardTableBody">
                <!-- Rows render here -->
            </tbody>
        </table>
    </div>

    <!-- Write Modal -->
    <div id="writeModal" class="modal" onclick="if(event.target===this) closeModal('writeModal')">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeModal('writeModal')"></i>
            <h2 style="margin-bottom: 1.5rem;" data-i18n="modal_write_title">게시글 작성</h2>
            <div class="form-group">
                <input type="text" id="writeTitle" class="form-input" placeholder="제목을 입력하세요" data-i18n="modal_ph_title">
            </div>
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <input type="text" id="writeName" class="form-input" placeholder="작성자 이름" data-i18n="modal_ph_name">
                </div>
                <div class="form-group" style="flex: 1;">
                    <input type="password" id="writePw" class="form-input" placeholder="비밀번호 (수정/삭제용)" autocomplete="new-password" data-i18n="modal_ph_pw">
                </div>
            </div>
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-secondary); margin-bottom: 1rem;">
                    <input type="checkbox" id="writeSecret" style="transform: scale(1.2);"> <span data-i18n="modal_secret">🔒 비밀글로 작성하기</span>
                </label>
            </div>
            <div class="form-group">
                <textarea id="writeContent" class="form-input" rows="8" placeholder="내용을 자유롭게 입력해주세요!" style="resize: vertical;" data-i18n="modal_ph_content"></textarea>
            </div>
            <button class="primary-btn" style="width: 100%;" onclick="submitPost()" data-i18n="modal_btn_submit">등록하기</button>
        </div>
    </div>

    <!-- View Modal -->
    <div id="viewModal" class="modal" onclick="if(event.target===this) closeModal('viewModal')">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeModal('viewModal')"></i>
            <h2 id="viewTitle" class="view-title">제목</h2>
            <div class="view-meta">
                <span><i class="fa-solid fa-user"></i> <span id="viewAuthor">작성자</span></span>
                <span><i class="fa-regular fa-clock"></i> <span id="viewDate">작성일</span></span>
            </div>
            <div id="viewContent" class="view-content">내용</div>
            
            <div class="view-actions">
                <button class="view-btn" id="btnLike" style="color: #ef4444; font-weight: 600;" onclick="likeCurrentPost()">
                    <span data-i18n="modal_btn_like"><i class="fa-solid fa-heart"></i> 추천</span> <span id="viewLikes">0</span>
                </button>
                <button class="view-btn" onclick="deleteCurrentPost()" data-i18n="modal_btn_delete">
                    <i class="fa-solid fa-trash"></i> 삭제
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentOpenPostId = null;

        // Theme Logic
        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('portfolio-theme', isLight ? 'light' : 'dark');
            document.querySelector('#themeToggle i').className = isLight ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }
        (function() {
            if (localStorage.getItem('portfolio-theme') !== 'dark') {
                document.body.classList.add('light-mode');
                document.querySelector('#themeToggle i').className = 'fa-solid fa-sun';
            }
        })();

        // Modal Logic
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // Board Logic
        function getMessages() {
            let messages = JSON.parse(localStorage.getItem('amk_board')) || [];
            // Migrate legacy data
            let needsSave = false;
            messages.forEach(msg => {
                if(!msg.id) { msg.id = Date.now().toString(36) + Math.random().toString(36).substr(2); needsSave = true; }
                if(msg.likes === undefined) { msg.likes = 0; needsSave = true; }
                if(msg.password === undefined) { msg.password = '0000'; needsSave = true; }
                if(msg.title === undefined) { msg.title = "자유게시판 게시글입니다."; needsSave = true; }
            });
            if(needsSave) localStorage.setItem('amk_board', JSON.stringify(messages));
            return messages;
        }

        function renderBoard() {
            const tbody = document.getElementById('boardTableBody');
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const messages = getMessages();
            
            tbody.innerHTML = '';
            
            // Filter
            const filtered = messages.filter(m => 
                m.title.toLowerCase().includes(searchKeyword) || 
                m.name.toLowerCase().includes(searchKeyword)
            ).reverse(); // newest first
            
            if (filtered.length === 0) {
                const emptyMsg = (typeof currentLang !== 'undefined' && currentLang === 'en') ? "No posts found." : "등록된 게시글이 없습니다.";
                tbody.innerHTML = `<tr><td colspan="5" class="empty-row">${emptyMsg}</td></tr>`;
                return;
            }

            filtered.forEach((msg, idx) => {
                const tr = document.createElement('tr');
                const secretTxt = (typeof currentLang !== 'undefined' && currentLang === 'en') ? "Secret Post." : "비밀글입니다.";
                const displayTitle = msg.isSecret ? `<i class="fa-solid fa-lock lock-icon"></i>${secretTxt}` : msg.title;
                
                tr.innerHTML = `
                    <td class="col-id">${filtered.length - idx}</td>
                    <td class="col-title">${displayTitle}</td>
                    <td class="col-author">${msg.name}</td>
                    <td class="col-date">${msg.date}</td>
                    <td class="col-likes">${msg.likes > 0 ? '<i class="fa-solid fa-heart"></i> ' + msg.likes : '-'}</td>
                `;
                tr.querySelector('.col-title').onclick = () => viewPost(msg.id);
                tbody.appendChild(tr);
            });
        }

        function submitPost() {
            const title = document.getElementById('writeTitle').value.trim();
            const name = document.getElementById('writeName').value.trim();
            const password = document.getElementById('writePw').value.trim();
            const content = document.getElementById('writeContent').value.trim();
            const isSecret = document.getElementById('writeSecret').checked;
            
            if(!title || !name || !password || !content) {
                alert('모든 항목을 입력해주세요.');
                return;
            }
            
            const messages = getMessages();
            const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' });
            const id = Date.now().toString(36) + Math.random().toString(36).substr(2);
            
            messages.push({ id, title, name, password, content, date, likes: 0, isSecret });
            localStorage.setItem('amk_board', JSON.stringify(messages));
            
            // Clear
            document.getElementById('writeTitle').value = '';
            document.getElementById('writeName').value = '';
            document.getElementById('writePw').value = '';
            document.getElementById('writeContent').value = '';
            document.getElementById('writeSecret').checked = false;
            
            closeModal('writeModal');
            renderBoard();
        }

        function viewPost(id) {
            const messages = getMessages();
            const msg = messages.find(m => m.id === id);
            if(!msg) return;

            if (msg.isSecret) {
                const pw = prompt('비밀글입니다. 비밀번호를 입력하세요:', '');
                if (pw === null) return;
                if (pw !== msg.password) {
                    alert('비밀번호가 일치하지 않습니다.');
                    return;
                }
            }

            currentOpenPostId = id;
            document.getElementById('viewTitle').textContent = msg.title;
            document.getElementById('viewAuthor').textContent = msg.name;
            document.getElementById('viewDate').textContent = msg.date;
            document.getElementById('viewContent').textContent = msg.content;
            document.getElementById('viewLikes').textContent = msg.likes;
            
            openModal('viewModal');
        }

        function likeCurrentPost() {
            if(!currentOpenPostId) return;
            const messages = getMessages();
            const msg = messages.find(m => m.id === currentOpenPostId);
            if(msg) {
                msg.likes++;
                localStorage.setItem('amk_board', JSON.stringify(messages));
                document.getElementById('viewLikes').textContent = msg.likes;
                renderBoard();
            }
        }

        function deleteCurrentPost() {
            if(!currentOpenPostId) return;
            const messages = getMessages();
            const index = messages.findIndex(m => m.id === currentOpenPostId);
            if(index !== -1) {
                const pw = prompt('게시글을 삭제하시겠습니까? 비밀번호를 입력하세요:', '');
                if (pw === null) return;
                if(pw === messages[index].password) {
                    messages.splice(index, 1);
                    localStorage.setItem('amk_board', JSON.stringify(messages));
                    closeModal('viewModal');
                    renderBoard();
                    alert('성공적으로 삭제되었습니다.');
                } else {
                    alert('비밀번호가 일치하지 않습니다.');
                }
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', renderBoard);
    </script>
    <script src="js/i18n.js"></script>
</body>
</html>
