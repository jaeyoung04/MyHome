<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자유게시판 | Samsung DX</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Default Dark Mode */
            --bg-base: #030712;
            --bg-bento: rgba(17, 24, 39, 0.6);
            --bg-bento-hover: rgba(31, 41, 55, 0.8);
            --border-bento: rgba(59, 130, 246, 0.2);
            --border-highlight: rgba(59, 130, 246, 0.6);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent-primary: #3b82f6;
            --accent-glow: 0 0 20px rgba(59, 130, 246, 0.5);
            --radius-lg: 24px;
            --transition: all 0.3s ease;
        }

        body.light-mode {
            --bg-base: #f8fafc;
            --bg-bento: rgba(255, 255, 255, 0.8);
            --bg-bento-hover: rgba(255, 255, 255, 1);
            --border-bento: rgba(203, 213, 225, 0.5);
            --border-highlight: rgba(59, 130, 246, 0.4);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-glow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 5rem;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        
        h1, h2, h3 { font-family: 'Outfit', sans-serif; font-weight: 800; letter-spacing: -0.03em; word-break: keep-all; }
        p { line-height: 1.6; word-break: keep-all; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(130, 130, 130, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(130, 130, 130, 0.6); }

        /* Top Navigation */
        .navbar {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: stretch;
            padding: 1.5rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        body.light-mode .navbar { border-bottom: 1px solid rgba(0,0,0,0.05); }

        @keyframes expandMenu {
            from { opacity: 0; clip-path: inset(0 0 100% 0); transform: translateY(-10px); }
            to { opacity: 1; clip-path: inset(0 0 0 0); transform: translateY(0); }
        }

        /* Premium Morphing Hamburger */
        .hamburger-container {
            width: 20px;
            height: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        .ham-line {
            display: block;
            height: 2px;
            width: 100%;
            border-radius: 2px;
            background-color: var(--text-primary);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            transform-origin: center;
        }
        .hamburger-container.is-active .ham-line:nth-child(1) {
            transform: translateY(6px) rotate(45deg);
        }
        .hamburger-container.is-active .ham-line:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .hamburger-container.is-active .ham-line:nth-child(3) {
            transform: translateY(-6px) rotate(-45deg);
        }

        .logo { font-size: 1.6rem; color: var(--text-primary); text-decoration: none; font-weight: 800; }
        .logo span { color: var(--accent-primary); font-weight: 900; }
        
        .glow-btn {
            background: rgba(59, 130, 246, 0.1); color: var(--text-primary);
            border: 1px solid var(--accent-primary); padding: 0.6rem 1.2rem;
            border-radius: 24px; cursor: pointer; font-weight: 600; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            height: 46px; white-space: nowrap; font-size: 0.95rem; text-decoration: none;
            font-family: 'Outfit';
        }
        .glow-btn i { font-size: 1rem; width: 1.2rem; text-align: center; }
        .glow-btn:hover { background: var(--accent-primary); box-shadow: var(--accent-glow); transform: translateY(-2px); }

        /* Board Container Layout */
        .page-container { max-width: 1200px; margin: 3rem auto; padding: 0 1.5rem; }
        .board-header { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            margin-bottom: 1rem; border-bottom: 2px solid var(--border-highlight); padding-bottom: 1rem;
        }
        .board-header h1 { font-size: 2.5rem; }
        .board-header .subtitle { color: var(--text-secondary); margin-left: 1rem; font-weight: 400; font-size: 1rem; }
        
        .board-controls { display: flex; justify-content: space-between; margin-bottom: 1.5rem; align-items: center; }
        .search-bar { 
            display: flex; align-items: center; background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border-bento); border-radius: 20px; padding: 0.4rem 1rem;
        }
        body.light-mode .search-bar { background: rgba(0,0,0,0.03); }
        .search-bar input { background: transparent; border: none; color: var(--text-primary); outline: none; padding-left: 0.5rem; width: 250px; }
        .primary-btn { 
            padding: 0.7rem 2rem; background: var(--accent-primary); color: white; 
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer; 
            transition: 0.2s; box-shadow: var(--accent-glow); font-size: 1rem;
        }
        .primary-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* List Table */
        .board-list { width: 100%; border-collapse: collapse; background: var(--bg-bento); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        body.light-mode .board-list { border: 1px solid var(--border-bento); }
        .board-list th, .board-list td { padding: 1.2rem 1rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        body.light-mode .board-list th, body.light-mode .board-list td { border-bottom-color: rgba(0,0,0,0.05); }
        .board-list th { color: var(--text-secondary); font-weight: 600; background: rgba(0,0,0,0.2); }
        body.light-mode .board-list th { background: rgba(0,0,0,0.03); }
        
        .board-list tr { transition: background 0.2s; }
        .board-list tr:hover { background: rgba(255,255,255,0.05); }
        body.light-mode .board-list tr:hover { background: rgba(0,0,0,0.02); }
        
        .col-id { width: 8%; color: var(--text-secondary); }
        .col-title { width: 50%; text-align: left !important; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .col-title:hover { color: var(--accent-primary); text-decoration: underline; }
        .col-author { width: 15%; }
        .col-date { width: 17%; color: var(--text-secondary); font-size: 0.9rem; }
        .col-likes { width: 10%; color: #ef4444; font-weight: 600; }

        .lock-icon { color: var(--text-secondary); margin-right: 6px; font-size: 0.9em; }
        .empty-row { padding: 3rem !important; color: var(--text-secondary); font-style: italic; }

        /* Modal Overlay */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s;
        }
        .modal.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: var(--bg-bento);
            border: 1px solid var(--border-highlight);
            border-radius: 40px;
            width: 95vw;
            max-width: 1200px;
            max-height: 85vh;
            padding: 3rem;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transform: scale(0.95) translateY(20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }
        body.light-mode .modal-content {
            background: rgba(255, 255, 255, 0.95);
        }
        .modal.active .modal-content {
            transform: scale(1) translateY(0);
        }
        
        .close-modal {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
            }
        .close-modal:hover {
            transform: rotate(90deg) scale(1.1);
            background: var(--accent-primary) !important;
            color: white !important;
        }
        body.light-mode .close-modal {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-primary);
        }
        body.light-mode .close-modal:hover {
            background: var(--accent-primary) !important;
            color: white !important;
        }

        /* Form Elements inside Modal */
        .form-group { margin-bottom: 1.2rem; }
        .form-input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-bento); 
            color: var(--text-primary); padding: 0.8rem 1rem; border-radius: 8px; font-family: 'Inter'; font-size: 1rem;
        }
        body.light-mode .form-input { background: white; border-color: #cbd5e1; color: #0f172a; }
        .form-input:focus { outline: none; border-color: var(--accent-primary); }
        
        /* Custom View Post Modal specific */
        .view-title { font-size: 1.8rem; margin-bottom: 0.5rem; word-break: break-all;}
        .view-meta { display: flex; gap: 1rem; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        body.light-mode .view-meta { border-bottom-color: rgba(0,0,0,0.1); }
        .view-content { min-height: 150px; font-size: 1.05rem; line-height: 1.7; white-space: pre-wrap; margin-bottom: 2rem; color: var(--text-primary); }
        .view-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
        body.light-mode .view-actions { border-top-color: rgba(0,0,0,0.1); }
        
        .view-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1rem; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .view-btn:hover { color: var(--accent-primary); }

        @media (max-width: 768px) {
            .board-controls { flex-direction: column; gap: 1rem; align-items: stretch; }
            .col-author, .col-date, .col-id { display: none; }
            .col-title { width: 80%; }
            .modal-content { padding: 1.5rem; }
        }
    </style>
</head>

            <h2 style="margin-bottom: 1.5rem;" data-i18n="modal_write_title">게시글 작성</h2>
            <div class="form-group">
                <input type="text" id="writeTitle" class="form-input" placeholder="제목을 입력하세요" data-i18n="modal_ph_title">
            </div>
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <input type="text" id="writeName" class="form-input" placeholder="작성자 이름" data-i18n="modal_ph_name">
                </div>
                <div class="form-group" style="flex: 1;">
                    <input type="password" id="writePw" class="form-input" placeholder="비밀번호 (수정/삭제용)" autocomplete="new-password" data-i18n="modal_ph_pw">
                </div>
            </div>
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-secondary); margin-bottom: 1rem;">
                    <input type="checkbox" id="writeSecret" style="transform: scale(1.2);"> <span data-i18n="modal_secret">🔒 비밀글로 작성하기</span>
                </label>
            </div>
            <div class="form-group">
                <textarea id="writeContent" class="form-input" rows="8" placeholder="내용을 자유롭게 입력해주세요!" style="resize: vertical;" data-i18n="modal_ph_content"></textarea>
            </div>
            <button class="primary-btn" style="width: 100%;" onclick="submitPost()" data-i18n="modal_btn_submit">등록하기</button>
        </div>
    </div>

    <!-- View Modal -->
    <div id="viewModal" class="modal" onclick="if(event.target===this) closeModal('viewModal')">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeModal('viewModal')"></i>
            <h2 id="viewTitle" class="view-title">제목</h2>
            <div class="view-meta">
                <span><i class="fa-solid fa-user"></i> <span id="viewAuthor">작성자</span></span>
                <span><i class="fa-regular fa-clock"></i> <span id="viewDate">작성일</span></span>
            </div>
            <div id="viewContent" class="view-content">내용</div>
            
            <div class="view-actions">
                <button class="view-btn" id="btnLike" style="color: #ef4444; font-weight: 600;" onclick="likeCurrentPost()">
                    <span data-i18n="modal_btn_like"><i class="fa-solid fa-heart"></i> 추천</span> <span id="viewLikes">0</span>
                </button>
                <button class="view-btn" onclick="deleteCurrentPost()" data-i18n="modal_btn_delete">
                    <i class="fa-solid fa-trash"></i> 삭제
                </button>
            </div>

            <!-- Comment Section -->
            <div class="comment-section">
                <div class="comment-header">
                    <i class="fa-solid fa-comments"></i> 댓글 <span id="commentCount">0</span>
                </div>
                
                <div id="commentList" class="comment-list">
                    <!-- Comments render here -->
                </div>

                <div class="comment-form">
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <input type="text" id="commentName" placeholder="작성자" class="comment-input" style="flex: 1;">
                        <input type="password" id="commentPw" placeholder="비밀번호" class="comment-input" style="flex: 1;">
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <textarea id="commentContent" placeholder="댓글을 남겨보세요..." class="comment-input" style="flex: 1; resize: none;" rows="2"></textarea>
                        <button class="comment-submit-btn" onclick="submitComment()">등록</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 이곳에 본인의 Firebase Project 설정값을 넣어주세요 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyBLwvGUYOAeOjxNh_62HUl-55jrkzKtQv0",
            authDomain: "portfolio-website-b2903.firebaseapp.com",
            projectId: "portfolio-website-b2903",
            storageBucket: "portfolio-website-b2903.firebasestorage.app",
            messagingSenderId: "336728440891",
            appId: "1:336728440891:web:f84557aa69b07a33e09c1e",
            measurementId: "G-YQ7TN9KFGF"
        };

        let db = null;
        try {
            if(true) {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
            }
        } catch(e) {
            console.error("Firebase 초기화 에러:", e);
        }

        let currentOpenPostId = null;

        // Theme Logic
        window.updateThemeUI = function(isLight) {
            const icon = document.querySelector('#themeToggle i');
            const textSpan = document.getElementById('themeText');
            if(icon) icon.className = isLight ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            if (textSpan) {
                const key = isLight ? 'theme_light' : 'theme_dark';
                textSpan.setAttribute('data-i18n', key);
                if (typeof i18n !== 'undefined' && i18n[currentLang]) {
                    textSpan.innerText = i18n[currentLang][key];
                }
            }
        }

        window.toggleTheme = function() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('portfolio-theme', isLight ? 'light' : 'dark');
            window.updateThemeUI(isLight);
        }

        const savedTheme = localStorage.getItem('portfolio-theme');
        const isLight = savedTheme !== 'dark';
        if (isLight) {
            document.body.classList.add('light-mode');
        } else {
            document.body.classList.remove('light-mode');
        }
        window.updateThemeUI(isLight);

        // Modal Logic
        window.openModal = function(id) {
            document.getElementById(id).classList.add('active');
        }
        window.closeModal = function(id) {
            document.getElementById(id).classList.remove('active');
        }

        // --- Data layer ---
        window.getMessages = async function() {
            if(!db) {
                let messages = JSON.parse(localStorage.getItem('amk_board')) || [];
                let needsSave = false;
                messages.forEach(msg => {
                    if(!msg.id) { msg.id = Date.now().toString(36) + Math.random().toString(36).substr(2); needsSave = true; }
                    if(msg.likes === undefined) { msg.likes = 0; needsSave = true; }
                    if(msg.password === undefined) { msg.password = '0000'; needsSave = true; }
                    if(msg.title === undefined) { msg.title = "자유게시판 게시글입니다."; needsSave = true; }
                });
                if(needsSave) localStorage.setItem('amk_board', JSON.stringify(messages));
                return messages;
            }

            try {
                const q = query(collection(db, "posts"), orderBy("createdAt", "asc"));
                const querySnapshot = await getDocs(q);
                let messages = [];
                querySnapshot.forEach((docSnap) => {
                    let data = docSnap.data();
                    messages.push({
                        fs_id: docSnap.id,
                        id: data.id || docSnap.id,
                        title: data.title,
                        name: data.name,
                        password: data.password,
                        content: data.content,
                        date: data.date,
                        createdAt: data.createdAt,
                        likes: data.likes || 0,
                        isSecret: data.isSecret || false,
                        comments: data.comments || []
                    });
                });
                return messages;
            } catch(e) {
                console.error("데이터 읽기 실패:", e);
                return [];
            }
        }

        window.renderBoard = async function() {
            const tbody = document.getElementById('boardTableBody');
            const searchInput = document.getElementById('searchInput');
            const searchKeyword = searchInput ? searchInput.value.toLowerCase().trim() : "";
            const messages = await window.getMessages();
            
            if(tbody) tbody.innerHTML = '';
            
            const filtered = messages.filter(m => 
                (m.title && m.title.toLowerCase().includes(searchKeyword)) || 
                (m.name && m.name.toLowerCase().includes(searchKeyword))
            ).reverse();
            
            if (filtered.length === 0) {
                const emptyMsg = (typeof currentLang !== 'undefined' && currentLang === 'en') ? "No posts found." : "등록된 게시글이 없습니다.";
                if(tbody) tbody.innerHTML = `<tr><td colspan="5" class="empty-row">${emptyMsg}</td></tr>`;
                return;
            }

            filtered.forEach((msg, idx) => {
                const tr = document.createElement('tr');
                const secretTxt = (typeof currentLang !== 'undefined' && currentLang === 'en') ? "Secret Post." : "비밀글입니다.";
                const commentCount = (msg.comments && msg.comments.length > 0) ? ` <span style="color: var(--accent-primary); font-size: 0.85rem; font-weight: 700;">[${msg.comments.length}]</span>` : '';
                const displayTitle = (msg.isSecret ? `<i class="fa-solid fa-lock lock-icon"></i>${secretTxt}` : msg.title) + commentCount;
                
                tr.innerHTML = `
                    <td class="col-id">${filtered.length - idx}</td>
                    <td class="col-title">${displayTitle}</td>
                    <td class="col-author">${msg.name}</td>
                    <td class="col-date">${msg.date}</td>
                    <td class="col-likes">${msg.likes > 0 ? '<i class="fa-solid fa-heart"></i> ' + msg.likes : '-'}</td>
                `;
                tr.querySelector('.col-title').onclick = () => window.viewPost(msg.id);
                if(tbody) tbody.appendChild(tr);
            });
        }

        window.submitPost = async function() {
            const title = document.getElementById('writeTitle').value.trim();
            const name = document.getElementById('writeName').value.trim();
            const password = document.getElementById('writePw').value.trim();
            const content = document.getElementById('writeContent').value.trim();
            const isSecret = document.getElementById('writeSecret').checked;
            
            if(!title || !name || !password || !content) {
                alert('모든 항목을 입력해주세요.');
                return;
            }

            const dateStr = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' });
            const id = Date.now().toString(36) + Math.random().toString(36).substr(2);
            
            const newPost = { id, title, name, password, content, date: dateStr, createdAt: new Date().getTime(), likes: 0, isSecret, comments: [] };

            if(!db) {
                let messages = await window.getMessages();
                messages.push(newPost);
                localStorage.setItem('amk_board', JSON.stringify(messages));
            } else {
                try {
                    await addDoc(collection(db, "posts"), newPost);
                } catch(e) {
                    console.error("쓰기 실패", e);
                }
            }
            
            document.getElementById('writeTitle').value = '';
            document.getElementById('writeName').value = '';
            document.getElementById('writePw').value = '';
            document.getElementById('writeContent').value = '';
            document.getElementById('writeSecret').checked = false;
            
            window.closeModal('writeModal');
            await window.renderBoard();
        }

        window.viewPost = async function(id) {
            const messages = await window.getMessages();
            const msg = messages.find(m => m.id === id);
            if(!msg) return;

            if (msg.isSecret) {
                const pw = prompt('비밀글입니다. 비밀번호를 입력하세요:', '');
                if (pw === null) return;
                if (pw !== msg.password) {
                    alert('비밀번호가 일치하지 않습니다.');
                    return;
                }
            }

            currentOpenPostId = id;
            document.getElementById('viewTitle').textContent = msg.title;
            document.getElementById('viewAuthor').textContent = msg.name;
            document.getElementById('viewDate').textContent = msg.date;
            document.getElementById('viewContent').textContent = msg.content;
            document.getElementById('viewLikes').textContent = msg.likes;
            
            window.openModal('viewModal');
            await window.renderComments(id);
        }

        window.renderComments = async function(postId) {
            const messages = await window.getMessages();
            const msg = messages.find(m => m.id === postId);
            if(!msg) return;

            const commentList = document.getElementById('commentList');
            const commentCount = document.getElementById('commentCount');
            const comments = msg.comments || [];

            if(commentCount) commentCount.textContent = comments.length;
            if(commentList) commentList.innerHTML = '';

            if(comments.length === 0) {
                if(commentList) commentList.innerHTML = '<div style="text-align: center; color: var(--text-secondary); font-size: 0.85rem; padding: 1rem;">아직 댓글이 없습니다. 첫 댓글을 남겨보세요!</div>';
                return;
            }

            comments.forEach(c => {
                const item = document.createElement('div');
                item.className = 'comment-item';
                item.innerHTML = `
                    <div class="comment-meta">
                        <div>
                            <span class="comment-author">${c.name}</span>
                            <span class="comment-date">${c.date}</span>
                        </div>
                        <i class="fa-solid fa-trash comment-delete" onclick="window.deleteComment('${postId}', '${c.id}')"></i>
                    </div>
                    <div class="comment-body">${c.content.replace(/\n/g, '<br>')}</div>
                    <div class="comment-actions">
                        <span class="comment-action-btn like" onclick="window.likeComment('${postId}', '${c.id}')">
                            <i class="fa-solid fa-thumbs-up"></i> ${c.likes || 0}
                        </span>
                        <span class="comment-action-btn dislike" onclick="window.dislikeComment('${postId}', '${c.id}')">
                            <i class="fa-solid fa-thumbs-down"></i> ${c.dislikes || 0}
                        </span>
                    </div>
                `;
                if(commentList) commentList.appendChild(item);
            });
        }

        window.updatePostInDB = async function(postId, updatedData) {
             const messages = await window.getMessages();
             const msg = messages.find(m => m.id === postId);
             if(!msg) return;

             if(!db) {
                 const idx = messages.findIndex(m => m.id === postId);
                 messages[idx] = Object.assign({}, messages[idx], updatedData);
                 localStorage.setItem('amk_board', JSON.stringify(messages));
             } else {
                 if(msg.fs_id) {
                     const docRef = doc(db, "posts", msg.fs_id);
                     await updateDoc(docRef, updatedData);
                 }
             }
        }

        window.submitComment = async function() {
            if(!currentOpenPostId) return;

            const name = document.getElementById('commentName').value.trim();
            const password = document.getElementById('commentPw').value.trim();
            const content = document.getElementById('commentContent').value.trim();

            if(!name || !password || !content) {
                alert('이름, 비밀번호, 내용을 모두 입력해주세요.');
                return;
            }

            const messages = await window.getMessages();
            const msgIndex = messages.findIndex(m => m.id === currentOpenPostId);
            if(msgIndex === -1) return;

            let currentComments = messages[msgIndex].comments || [];

            const newComment = {
                id: Date.now().toString(36) + Math.random().toString(36).substr(2),
                name,
                password,
                content,
                likes: 0,
                dislikes: 0,
                date: new Date().toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' })
            };

            currentComments.push(newComment);
            await window.updatePostInDB(currentOpenPostId, { comments: currentComments });

            document.getElementById('commentName').value = '';
            document.getElementById('commentPw').value = '';
            document.getElementById('commentContent').value = '';

            await window.renderComments(currentOpenPostId);
        }

        window.deleteComment = async function(postId, commentId) {
            const messages = await window.getMessages();
            const msgIndex = messages.findIndex(m => m.id === postId);
            if(msgIndex === -1) return;

            const comments = messages[msgIndex].comments || [];
            const commentIndex = comments.findIndex(c => c.id === commentId);
            if(commentIndex === -1) return;

            const pw = prompt('댓글을 삭제하시겠습니까? 비밀번호를 입력하세요:', '');
            if(pw === null) return;

            if(pw === comments[commentIndex].password) {
                comments.splice(commentIndex, 1);
                await window.updatePostInDB(postId, { comments: comments });
                await window.renderComments(postId);
            } else {
                alert('비밀번호가 일치하지 않습니다.');
            }
        }

        window.likeComment = async function(postId, commentId) {
            const messages = await window.getMessages();
            const msgIndex = messages.findIndex(m => m.id === postId);
            const comments = messages[msgIndex].comments || [];
            const commentIndex = comments.findIndex(c => c.id === commentId);
            if(commentIndex !== -1) {
                comments[commentIndex].likes = (comments[commentIndex].likes || 0) + 1;
                await window.updatePostInDB(postId, { comments: comments });
                await window.renderComments(postId);
            }
        }

        window.dislikeComment = async function(postId, commentId) {
            const messages = await window.getMessages();
            const msgIndex = messages.findIndex(m => m.id === postId);
            const comments = messages[msgIndex].comments || [];
            const commentIndex = comments.findIndex(c => c.id === commentId);
            if(commentIndex !== -1) {
                comments[commentIndex].dislikes = (comments[commentIndex].dislikes || 0) + 1;
                await window.updatePostInDB(postId, { comments: comments });
                await window.renderComments(postId);
            }
        }

        window.likeCurrentPost = async function() {
            if(!currentOpenPostId) return;
            const messages = await window.getMessages();
            const msg = messages.find(m => m.id === currentOpenPostId);
            if(msg) {
                let newLikes = (msg.likes || 0) + 1;
                await window.updatePostInDB(currentOpenPostId, { likes: newLikes });
                document.getElementById('viewLikes').textContent = newLikes;
                await window.renderBoard();
            }
        }

        window.deleteCurrentPost = async function() {
            if(!currentOpenPostId) return;
            const messages = await window.getMessages();
            const msg = messages.find(m => m.id === currentOpenPostId);
            if(msg) {
                const pw = prompt('게시글을 삭제하시겠습니까? 비밀번호를 입력하세요:', '');
                if (pw === null) return;
                if(pw === msg.password) {
                    if(!db) {
                        const index = messages.findIndex(m => m.id === currentOpenPostId);
                        messages.splice(index, 1);
                        localStorage.setItem('amk_board', JSON.stringify(messages));
                    } else if(msg.fs_id) {
                        await deleteDoc(doc(db, "posts", msg.fs_id));
                    }
                    window.closeModal('viewModal');
                    await window.renderBoard();
                    alert('성공적으로 삭제되었습니다.');
                } else {
                    alert('비밀번호가 일치하지 않습니다.');
                }
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', async () => {
            await window.renderBoard();
        });
    </script>
    <script src="js/i18n.js"></script>
</body>
</html>
